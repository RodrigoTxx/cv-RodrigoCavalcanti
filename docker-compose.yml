services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cv-rodrigo-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NODE_ENV: development
    command: npm run dev -- --host 0.0.0.0 --port 5173
